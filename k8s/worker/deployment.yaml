apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: larafleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: larafleet-api:latest
          imagePullPolicy: Never
          command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600"]
          envFrom:
            - configMapRef:
                name: larafleet-config
            - secretRef:
                name: larafleet-secret
