apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: larafleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: larafleet-api:latest
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              while true; do
                php artisan schedule:run --verbose --no-interaction &
                sleep 60
              done
          envFrom:
            - configMapRef:
                name: larafleet-config
            - secretRef:
                name: larafleet-secret
