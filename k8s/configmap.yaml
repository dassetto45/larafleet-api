apiVersion: v1
kind: ConfigMap
metadata:
  name: larafleet-config
  namespace: larafleet
data:
  APP_NAME: "LaraFleet"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "http://larafleet.local"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "larafleet"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: "redis"
  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  MAIL_MAILER: "smtp"
  MAIL_HOST: "mailpit"
  MAIL_PORT: "1025"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: larafleet
data:
  default.conf: |
    server {
        listen 80;
        index index.php;
        root /var/www/public;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
